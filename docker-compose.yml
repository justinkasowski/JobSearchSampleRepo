services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    environment:
      - OLLAMA_KEEP_ALIVE=10m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag_demo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload
    ports:
      - "8080:8080"
    depends_on:
      - ollama
      - postgres
    volumes:
      - ./data:/data
      - ./services/api:/app
    environment:
      - LOCAL_RUN=true
      - VECTOR_BACKEND=pgvector
      - DB_USER=postgres
      - DB_PASS=postgres
      - DB_NAME=rag_demo
      - DB_HOST=postgres
      - DB_PORT=5432
      - PGVECTOR_CONNECTION_STRING=postgresql+psycopg://postgres:postgres@postgres:5432/rag_demo
      - OLLAMA_MODEL=llama3:8b
      - OLLAMA_KEEP_ALIVE=10m
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_URL=http://ollama:11434/api/generate
      - EMBED_MODEL_NAME=sentence-transformers/all-MiniLM-L6-v2
      - SLACK_WEBHOOK_POLICY=${SLACK_WEBHOOK_POLICY:-}
      - SLACK_WEBHOOK_HR=${SLACK_WEBHOOK_HR:-}
      - SLACK_WEBHOOK_SALES=${SLACK_WEBHOOK_SALES:-}
      - SLACK_WEBHOOK_HEALTHCHECK=${SLACK_WEBHOOK_HEALTHCHECK:-}
      - DISCORD_WEBHOOK_POLICY=${DISCORD_WEBHOOK_POLICY:-}
      - DISCORD_WEBHOOK_HR=${DISCORD_WEBHOOK_HR:-}
      - DISCORD_WEBHOOK_SALES=${DISCORD_WEBHOOK_SALES:-}

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_KEEP_ALIVE=10m
    entrypoint: sh -c "until ollama list; do sleep 2; done; ollama pull llama3:8b"
    volumes:
      - ollama_models:/root/.ollama

volumes:
  ollama_models:
  postgres_data: